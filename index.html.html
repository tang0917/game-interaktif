<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengembaraan Parameswara: Game Sejarah Interaktif</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a3f2c 0%, #2d5a3e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-wrapper {
            max-width: 1400px;
            width: 100%;
            background: #f4e4bc;
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 8px solid #b8860b;
            position: relative;
        }

        /* Animations */
        @keyframes coinFloat {
            0% { transform: translateY(0) rotateY(0); opacity: 1; }
            100% { transform: translateY(-100px) rotateY(720deg); opacity: 0; }
        }

        .floating-coin {
            position: fixed;
            font-size: 2em;
            z-index: 9999;
            pointer-events: none;
            animation: coinFloat 1s forwards;
        }

        /* Hero Section */
        .hero-section {
            background: linear-gradient(rgba(0, 30, 0, 0.8), rgba(0, 40, 0, 0.9)), 
                        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200"><rect width="400" height="200" fill="%232d5a2d"/><circle cx="80" cy="80" r="30" fill="%233d8c40"/><circle cx="320" cy="100" r="35" fill="%233d8c40"/><polygon points="200,40 225,100 285,100 240,140 260,200 200,170 140,200 160,140 115,100 175,100" fill="%23ffd700"/></svg>');
            background-size: cover;
            color: white;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 5px solid #daa520;
            position: relative;
        }

        .hero-section h1 {
            font-size: 3.5em;
            text-shadow: 4px 4px 0 #000;
            color: #ffd700;
            letter-spacing: 3px;
        }

        .hero-section h2 {
            font-size: 2.5em;
            text-shadow: 3px 3px 0 #000;
            color: #fff;
        }

        /* Restart Button */
        .restart-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #e74c3c;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            border: 3px solid #ffd700;
            box-shadow: 0 5px 0 #c0392b;
            transition: all 0.3s;
            z-index: 100;
        }

        .restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 0 #c0392b;
        }

        /* Resource Bar */
        .resource-bar {
            background: #2c3e50;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #daa520;
            flex-wrap: wrap;
            gap: 15px;
        }

        .coins-display {
            background: linear-gradient(145deg, #ffd700, #ffaa00);
            padding: 12px 30px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 0 30px #ffd700;
            border: 3px solid #fff;
        }

        .coins-display .coin-icon { font-size: 2.5em; }
        .coins-display .coin-amount { font-size: 2.2em; font-weight: 900; color: #8b4513; }

        /* Progress Dots */
        .progress-section {
            background: #8b4513;
            padding: 15px 30px;
        }

        .journey-progress {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            flex-wrap: wrap;
        }

        .station-indicators {
            display: flex;
            gap: 20px;
        }

        .station-dot {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #a9a9a9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            border: 3px solid #696969;
            position: relative;
            transition: all 0.3s;
        }

        .station-dot.completed { background: #2ecc71; border-color: #27ae60; }
        .station-dot.active { background: #ffd700; color: #000; border-color: #f39c12; }
        .station-dot.locked { background: #4a4a4a; opacity: 0.7; }
        .station-dot.locked::after { content: "🔒"; position: absolute; font-size: 1.2em; top: -5px; right: -5px; }

        .dot-score { font-size: 0.7em; background: rgba(0,0,0,0.5); padding: 2px 5px; border-radius: 10px; margin-top: 2px; }

        /* Station Buttons */
        .stations-container {
            background: #f4e4bc;
            padding: 40px 20px;
            text-align: center;
        }

        .stations-title {
            font-size: 2.2em;
            color: #8b4513;
            margin-bottom: 40px;
            text-transform: uppercase;
            font-weight: 900;
            text-shadow: 3px 3px 0 #ffd700;
        }

        .stations-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .station-main-btn {
            width: 250px;
            padding: 20px;
            border-radius: 30px 30px 60px 60px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            font-weight: bold;
            font-size: 1.5em;
            text-shadow: 3px 3px 0 #000;
            box-shadow: 0 15px 0 rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            position: relative;
            border: 4px solid #ffd700;
        }

        .station-main-btn .station-icon { font-size: 4em; }
        .station-main-btn .game-cost { 
            background: #e74c3c; 
            color: white; 
            padding: 5px 15px; 
            border-radius: 30px; 
            font-size: 0.6em;
            border: 2px solid white;
        }
        .station-main-btn .game-type {
            background: #2c3e50;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.5em;
        }

        .station-main-btn.completed { opacity: 0.8; border-color: #2ecc71; }
        .station-main-btn.locked { opacity: 0.5; cursor: not-allowed; pointer-events: none; filter: grayscale(100%); }
        .station-main-btn.locked::before { content: "🔒"; position: absolute; font-size: 4em; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2; }

        .station-main-btn[data-station="palembang"] { background: #e67e22; }
        .station-main-btn[data-station="temasik"] { background: #3498db; }
        .station-main-btn[data-station="muar"] { background: #2ecc71; }
        .station-main-btn[data-station="melaka"] { background: #e74c3c; }

        /* Modal */
        .game-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .game-content {
            background: #f4e4bc;
            width: 95%;
            max-width: 1200px;
            border-radius: 30px;
            padding: 30px;
            border: 8px solid #ffd700;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #e74c3c;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5em;
            cursor: pointer;
            z-index: 10;
        }

        /* Station Header */
        .station-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 3px solid #ffd700;
        }

        .station-header h2 {
            color: #8b4513;
            font-size: 2.2em;
            margin-bottom: 10px;
        }

        .station-progress {
            background: #2c3e50;
            color: white;
            padding: 10px;
            border-radius: 30px;
            display: inline-block;
            padding: 8px 30px;
        }

        /* Questions Grid */
        .questions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .question-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            border: 3px solid #b8860b;
            box-shadow: 0 5px 0 #8b4513;
        }

        .question-number {
            background: #ffd700;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .question-text-card {
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 15px;
            min-height: 60px;
        }

        .question-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 15px 0;
        }

        .option-btn-card {
            padding: 10px;
            border: 2px solid #b8860b;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
        }

        .option-btn-card:hover:not(:disabled) {
            background: #ffd700;
        }

        .option-btn-card.correct {
            background: #2ecc71;
            color: white;
            border-color: #27ae60;
        }

        .option-btn-card.wrong {
            background: #e74c3c;
            color: white;
            border-color: #c0392b;
        }

        .question-feedback {
            margin-top: 10px;
            padding: 8px;
            border-radius: 8px;
            font-size: 0.9em;
            text-align: center;
        }

        /* Game Container */
        .game-container {
            background: #2c1a0a;
            border-radius: 20px;
            padding: 25px;
            border: 5px solid #ffd700;
            margin-top: 20px;
        }

        .game-unlocked-banner {
            background: #2ecc71;
            color: white;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 20px;
            animation: pulse 1s infinite;
        }

        .game-header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: white;
        }

        .game-title-large {
            color: #ffd700;
            font-size: 2em;
            font-weight: bold;
        }

        .game-balance-large {
            background: #34495e;
            padding: 10px 25px;
            border-radius: 40px;
            font-size: 1.2em;
        }

        .game-area-large {
            background: #1a1a1a;
            border-radius: 15px;
            padding: 20px;
            min-height: 400px;
        }

        .play-game-large-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.3em;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            border-bottom: 5px solid #27ae60;
        }

        .play-game-large-btn:disabled {
            background: #95a5a6;
            border-bottom-color: #7f8c8d;
            cursor: not-allowed;
        }

        /* Game Instructions */
        .game-instructions-panel {
            background: #34495e;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            color: white;
            border-left: 5px solid #ffd700;
        }

        .game-instructions-panel h4 {
            color: #ffd700;
            margin-bottom: 10px;
        }

        .game-instructions-panel li {
            margin: 5px 0;
            list-style-type: none;
            padding-left: 25px;
            position: relative;
        }

        .game-instructions-panel li:before {
            content: "🎮";
            position: absolute;
            left: 0;
        }

        /* Timer */
        .game-timer {
            background: #e74c3c;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 1.2em;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }

        /* Cafe Game */
        .cafe-game {
            background: #8b4513;
            border-radius: 10px;
            padding: 15px;
        }

        .cafe-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            color: white;
        }

        .cafe-coins {
            background: #ffd700;
            color: #8b4513;
            padding: 5px 15px;
            border-radius: 30px;
            font-weight: bold;
        }

        .cafe-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .cafe-table {
            background: #d2b48c;
            border: 3px solid #ffd700;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .cafe-table:hover {
            transform: scale(1.05);
        }

        .cafe-table.occupied { background: #e74c3c; }
        .cafe-table .customer { font-size: 2em; }
        .cafe-table .order { font-size: 1.5em; }

        .kitchen-area {
            background: #2c3e50;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
        }

        .food-item {
            display: inline-block;
            background: #f1c40f;
            padding: 8px 15px;
            border-radius: 30px;
            margin: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.2em;
        }

        .food-item:hover {
            transform: scale(1.1);
        }

        .food-item.selected {
            background: #2ecc71;
            border: 2px solid white;
            box-shadow: 0 0 20px #2ecc71;
        }

        .food-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Snake Game */
        .snake-game-canvas {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #snakeCanvas {
            display: block;
            margin: 0 auto;
            border: 4px solid #ffd700;
            border-radius: 15px;
            background: #1a1a1a;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            width: 100%;
            max-width: 600px;
            height: auto;
        }

        .snake-score-display {
            color: white;
            font-size: 1.3em;
            margin: 10px 0;
            text-align: center;
        }

        .snake-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .control-key {
            background: #2c3e50;
            border: 2px solid #ffd700;
            border-radius: 10px;
            padding: 10px 15px;
            color: white;
            font-size: 1.2em;
            min-width: 60px;
            text-align: center;
        }

        .snake-status {
            color: #ffd700;
            font-weight: bold;
            margin: 10px 0;
        }

        .game-over-message {
            text-align: center;
            color: #e74c3c;
            font-size: 2em;
            font-weight: bold;
            margin: 10px 0;
            display: none;
        }

        .game-over-message.show {
            display: block;
            animation: pulse 1s infinite;
        }

        /* Flappy Bird Game */
        .flappy-game {
            background: #3498db;
            border-radius: 10px;
            position: relative;
            height: 400px;
            overflow: hidden;
            cursor: pointer;
        }

        .bird {
            position: absolute;
            left: 100px;
            font-size: 3em;
            transition: top 0.05s linear;
            z-index: 10;
        }

        .pipe {
            position: absolute;
            width: 60px;
            background: #27ae60;
            border: 3px solid #2c3e50;
        }

        .pipe.top { top: 0; }
        .pipe.bottom { bottom: 0; }

        .flappy-score {
            position: absolute;
            top: 10px;
            right: 10px;
            color: white;
            font-size: 1.5em;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
        }

        .flappy-status {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 1.2em;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 20px;
        }

        /* Invaders Game */
        .invaders-game {
            background: #0a0a0a;
            border-radius: 10px;
            padding: 15px;
            position: relative;
            min-height: 400px;
        }

        .defender {
            position: absolute;
            bottom: 30px;
            font-size: 3em;
            transition: left 0.1s;
            z-index: 20;
        }

        .bullet {
            position: absolute;
            width: 5px;
            height: 15px;
            background: #ffd700;
            border-radius: 3px;
            z-index: 15;
        }

        .enemy-fleet {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 100px;
            padding: 20px;
        }

        .enemy-ship {
            font-size: 2em;
            animation: float 2s infinite;
            text-align: center;
            transition: all 0.3s;
        }

        .enemy-ship.alive {
            cursor: pointer;
            filter: drop-shadow(0 0 10px #e74c3c);
        }

        .enemy-ship.dead {
            opacity: 0.3;
            filter: grayscale(100%);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(10px); }
        }

        .invaders-controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
            position: absolute;
            bottom: 10px;
            left: 0;
            right: 0;
        }

        .invaders-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 1.2em;
            cursor: pointer;
            border-bottom: 4px solid #2980b9;
            transition: all 0.2s;
        }

        .invaders-btn:hover {
            transform: translateY(-2px);
        }

        .invaders-btn:active {
            transform: translateY(2px);
        }

        .invaders-score {
            position: absolute;
            top: 10px;
            right: 10px;
            color: white;
            font-size: 1.3em;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 30px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <!-- Hero Section with Restart Button -->
        <div class="hero-section">
            <button class="restart-btn" onclick="restartGame()">
                🔄 MAIN SEMULA
            </button>
            <h1>PENGEMBARAAN PARAMESWARA:</h1>
            <h2>MEMBINA MELAKA</h2>
        </div>

        <!-- Resource Bar -->
        <div class="resource-bar">
            <div class="coins-display" id="coinDisplay">
                <span class="coin-icon">🪙</span>
                <span class="coin-amount" id="coinAmount">500</span>
                <span class="coin-label">Sejarah Coins</span>
            </div>
        </div>

        <!-- Progress Dots -->
        <div class="progress-section">
            <div class="journey-progress">
                <div class="station-indicators" id="stationIndicators">
                    <div class="station-dot active" id="dot-palembang">P<span class="dot-score" id="score-palembang">0/5</span></div>
                    <div class="station-dot locked" id="dot-temasik">T<span class="dot-score" id="score-temasik">🔒</span></div>
                    <div class="station-dot locked" id="dot-muar">M<span class="dot-score" id="score-muar">🔒</span></div>
                    <div class="station-dot locked" id="dot-melaka">L<span class="dot-score" id="score-melaka">🔒</span></div>
                </div>
                <div class="total-score" id="totalScoreDisplay">🌟 0/20</div>
            </div>
        </div>

        <!-- Station Buttons -->
        <div class="stations-container">
            <h2 class="stations-title">🎮 PILIH STESEN UNTUK BELAJAR SEJARAH 🎮</h2>
            <div class="stations-grid">
                <button class="station-main-btn" data-station="palembang" id="btn-palembang">
                    <span class="station-icon">🏯</span>
                    <span>PALEMBANG</span>
                    <span class="game-type">SNAKE.IO</span>
                    <span class="game-cost">🎮 50 coins/main</span>
                </button>
                <button class="station-main-btn locked" data-station="temasik" id="btn-temasik" disabled>
                    <span class="station-icon">🏝️</span>
                    <span>TEMASIK</span>
                    <span class="game-type">CAFE</span>
                    <span class="game-cost">🎮 75 coins/main</span>
                </button>
                <button class="station-main-btn locked" data-station="muar" id="btn-muar" disabled>
                    <span class="station-icon">🌊</span>
                    <span>MUAR</span>
                    <span class="game-type">FLAPPY BIRD</span>
                    <span class="game-cost">🎮 100 coins/main</span>
                </button>
                <button class="station-main-btn locked" data-station="melaka" id="btn-melaka" disabled>
                    <span class="station-icon">🏰</span>
                    <span>MELAKA</span>
                    <span class="game-type">INVADERS</span>
                    <span class="game-cost">🎮 150 coins/main</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Game Modal -->
    <div id="gameModal" class="game-modal hidden">
        <div class="game-content" id="gameContent"></div>
    </div>

    <script>
        // ==================== GAME STATE ====================
        let currentStation = null;
        let sejarahCoins = 500;
        
        // Station completion
        let stationCompleted = {
            palembang: false,
            temasik: false,
            muar: false,
            melaka: false
        };
        
        let scores = {
            palembang: 0,
            temasik: 0,
            muar: 0,
            melaka: 0
        };

        let answers = {
            palembang: new Array(5).fill(null),
            temasik: new Array(5).fill(null),
            muar: new Array(5).fill(null),
            melaka: new Array(5).fill(null)
        };

        // Game costs
        const gameCosts = {
            palembang: 50,
            temasik: 75,
            muar: 100,
            melaka: 150
        };

        // Game active states
        let gameActive = false;

        // ==================== SNAKE GAME STATE ====================

        function drawSnakeCanvas() {
            if (!snakeCtx || !snakeCanvas) return;
            
            const ctx = snakeCtx;
            const canvas = snakeCanvas;
            const gridSize = snakeGame.gridSize;
            
            // Clear canvas
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid
            ctx.strokeStyle = '#2c3e50';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= canvas.width; i += gridSize) {
                ctx.beginPath();
                ctx.strokeStyle = '#34495e';
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= canvas.height; i += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }
            
            // Draw food
            ctx.shadowColor = '#e74c3c';
            ctx.shadowBlur = 15;
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.arc(
                snakeGame.food.x * gridSize + gridSize/2,
                snakeGame.food.y * gridSize + gridSize/2,
                gridSize/2 - 2, 0, Math.PI * 2
            );
            ctx.fill();
            
            // Draw snake
            snakeGame.snake.forEach((segment, index) => {
                if (index === 0) {
                    ctx.fillStyle = '#f1c40f';
                    ctx.shadowColor = '#f1c40f';
                } else {
                    ctx.fillStyle = '#2ecc71';
                    ctx.shadowColor = '#2ecc71';
                }
                
                ctx.shadowBlur = 15;
                
                ctx.beginPath();
                ctx.roundRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2,
                    5
                );
                ctx.fill();
                
                // Draw eyes on head
                if (index === 0) {
                    ctx.fillStyle = '#000';
                    ctx.shadowBlur = 0;
                    
                    const eyeSize = 3;
                    if (snakeGame.direction === 'right') {
                        ctx.fillRect(segment.x * gridSize + 12, segment.y * gridSize + 5, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + 12, segment.y * gridSize + 12, eyeSize, eyeSize);
                    } else if (snakeGame.direction === 'left') {
                        ctx.fillRect(segment.x * gridSize + 5, segment.y * gridSize + 5, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + 5, segment.y * gridSize + 12, eyeSize, eyeSize);
                    } else if (snakeGame.direction === 'up') {
                        ctx.fillRect(segment.x * gridSize + 5, segment.y * gridSize + 5, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + 12, segment.y * gridSize + 5, eyeSize, eyeSize);
                    } else if (snakeGame.direction === 'down') {
                        ctx.fillRect(segment.x * gridSize + 5, segment.y * gridSize + 12, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + 12, segment.y * gridSize + 12, eyeSize, eyeSize);
                    }
                }
            });
            
            ctx.shadowBlur = 0;
            
            const scoreSpan = document.getElementById('snakeScoreValue');
            if (scoreSpan) scoreSpan.textContent = snakeGame.score;
        }

        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            this.closePath();
            return this;
        };

        function spawnSnakeFood() {
            let x, y;
            do {
                x = Math.floor(Math.random() * snakeGame.gridWidth);
                y = Math.floor(Math.random() * snakeGame.gridHeight);
            } while (snakeGame.snake.some(s => s.x === x && s.y === y));
            
            snakeGame.food = {x, y};
        }

        function moveSnake() {
            if (!snakeGame.gameActive) return;
            
            snakeGame.direction = snakeGame.nextDirection;
            
            const head = {...snakeGame.snake[0]};
            
            switch(snakeGame.direction) {
                case 'right': head.x++; break;
                case 'left': head.x--; break;
                case 'up': head.y--; break;
                case 'down': head.y++; break;
            }
            
            // Check wall collision
            if (head.x < 0 || head.x >= snakeGame.gridWidth || head.y < 0 || head.y >= snakeGame.gridHeight) {
                snakeGameOver();
                return;
            }
            
            // Check self collision
            if (snakeGame.snake.some((segment, index) => index !== 0 && segment.x === head.x && segment.y === head.y)) {
                snakeGameOver();
                return;
            }
            
            snakeGame.snake.unshift(head);
            
            if (head.x === snakeGame.food.x && head.y === snakeGame.food.y) {
                snakeGame.score += 10;
                addCoins(25);
                spawnSnakeFood();
                
                const scoreSpan = document.getElementById('snakeScoreValue');
                if (scoreSpan) scoreSpan.textContent = snakeGame.score;
            } else {
                snakeGame.snake.pop();
            }
            
            drawSnakeCanvas();
        }

        function updateFlappyGame() {
            if (!flappyGame.gameActive) return;
            
            // Update bird physics
            flappyGame.birdVelocity += flappyGame.gravity;
            flappyGame.birdY += flappyGame.birdVelocity;
            
            // Move pipes
            flappyGame.pipes.forEach(pipe => {
                pipe.x -= 3;
            });
            
            // Remove off-screen pipes
            flappyGame.pipes = flappyGame.pipes.filter(p => p.x > -100);
            
            // Generate new pipes
            if (Math.random() < 0.02) {
                const gap = 150;
                const topHeight = 50 + Math.random() * 200;
                flappyGame.pipes.push({
                    x: 500,
                    topHeight: topHeight,
                    bottomHeight: 400 - topHeight - gap
                });
            }
            
            // Check collisions
            if (flappyGame.birdY < 0 || flappyGame.birdY > 380) {
                flappyGameOver();
                return;
            }
            
            for (let pipe of flappyGame.pipes) {
                if (pipe.x < 120 && pipe.x > 60) {
                    if (flappyGame.birdY < pipe.topHeight || flappyGame.birdY > 400 - pipe.bottomHeight) {
                        flappyGameOver();
                        return;
                    }
                }
                
                // Score when passing pipe
                if (pipe.x === 60) {
                    flappyGame.score += 10;
                    addCoins(25);
                }
            }
            
            loadGameContent();
        }

        function flappyGameOver() {
            flappyGame.gameActive = false;
            if (flappyGame.interval) {
                clearInterval(flappyGame.interval);
                flappyGame.interval = null;
            }
            
            const statusEl = document.getElementById('flappyStatus');
            if (statusEl) statusEl.innerHTML = '🔴 Game Over!';
            
            setTimeout(() => {
                closeModal();
            }, 2000);
        }

        function startFlappyGame() {
            if (!flappyGame.gameActive) {
                initFlappyGame();
                flappyGame.gameActive = true;
                
                if (flappyGame.interval) clearInterval(flappyGame.interval);
                flappyGame.interval = setInterval(updateFlappyGame, 30);
                
                loadGameContent();
            }
        }

        // ==================== INVADERS GAME FUNCTIONS ====================
        function initInvadersGame() {
            invadersGame.enemies = Array(15).fill(true);
            invadersGame.position = 2;
            invadersGame.bullets = [];
            invadersGame.score = 0;
            invadersGame.gameActive = false;
        }

        function renderInvadersGame() {
            return `
                <div class="invaders-game" id="invadersContainer" style="height: 400px; position: relative;">
                    <div class="invaders-score">Skor: ${invadersGame.score}</div>
                    <div class="enemy-fleet">
                        ${invadersGame.enemies.map((alive, i) => `
                            <div class="enemy-ship ${alive ? 'alive' : 'dead'}" data-index="${i}">${alive ? '👾' : '💥'}</div>
                        `).join('')}
                    </div>
                    <div class="defender" style="left: ${120 + invadersGame.position * 80}px;">🛡️</div>
                    ${invadersGame.bullets.map(bullet => `
                        <div class="bullet" style="left: ${bullet.x}px; bottom: ${bullet.y}px;"></div>
                    `).join('')}
                    <div class="invaders-controls">
                        <button class="invaders-btn" onclick="moveDefender(-1)">⬅️ Kiri</button>
                        <button class="invaders-btn" onclick="shootBullet()">🔫 Tembak</button>
                        <button class="invaders-btn" onclick="moveDefender(1)">➡️ Kanan</button>
                    </div>
                </div>
            `;
        }

        function moveDefender(direction) {
            if (!invadersGame.gameActive) return;
            
            invadersGame.position += direction;
            if (invadersGame.position < 0) invadersGame.position = 0;
            if (invadersGame.position > 4) invadersGame.position = 4;
            loadGameContent();
        }

        function shootBullet() {
            if (!invadersGame.gameActive) return;
            
            invadersGame.bullets.push({
                x: 140 + invadersGame.position * 80,
                y: 30
            });
        }

        function updateInvadersGame() {
            if (!invadersGame.gameActive) return;
            
            // Move bullets
            invadersGame.bullets = invadersGame.bullets.filter(bullet => {
                bullet.y += 5;
                
                // Check collision with enemies
                for (let i = 0; i < invadersGame.enemies.length; i++) {
                    if (invadersGame.enemies[i]) {
                        const enemyX = 50 + (i % 5) * 80;
                        const enemyY = 50 + Math.floor(i / 5) * 60;
                        
                        if (Math.abs(bullet.x - enemyX) < 30 && Math.abs(350 - bullet.y - enemyY) < 30) {
                            invadersGame.enemies[i] = false;
                            invadersGame.score += 10;
                            addCoins(50);
                            return false;
                        }
                    }
                }
                
                return bullet.y < 400;
            });
            
            // Check win condition
            if (invadersGame.enemies.every(e => !e)) {
                invadersGame.gameActive = false;
                alert('🎉 Tahniah! Anda menang!');
                closeModal();
            }
            
            loadGameContent();
        }

        function startInvadersGame() {
            if (!invadersGame.gameActive) {
                initInvadersGame();
                invadersGame.gameActive = true;
                
                if (invadersGame.interval) clearInterval(invadersGame.interval);
                invadersGame.interval = setInterval(updateInvadersGame, 50);
                
                loadGameContent();
            }
        }

        // ==================== MAIN STATION FUNCTIONS ====================
        function openStation(station) {
            const stationIndex = stationOrder.indexOf(station);
            if (stationIndex > 0 && !stationCompleted[stationOrder[stationIndex - 1]]) {
                alert('Selesaikan stesen sebelumnya dahulu!');
                return;
            }

            if (stationCompleted[station]) {
                alert(`Stesen ${stationNames[station]} sudah selesai!`);
                return;
            }

            currentStation = station;
            
            document.getElementById('gameModal').classList.remove('hidden');
            loadStationContent();
        }

        function loadStationContent() {
            if (!currentStation) return;
            
            const stationQuestions = questions[currentStation];
            const isComplete = isStationComplete(currentStation);
            
            let html = `
                <button class="close-btn" onclick="closeModal()">&times;</button>
                
                <div class="station-header">
                    <h2>${stationNames[currentStation]}</h2>
                    <div class="station-progress">
                        Soalan ${answers[currentStation].filter(a => a !== null).length}/5
                    </div>
                </div>
                
                <div class="questions-grid">
            `;
            
            stationQuestions.forEach((q, index) => {
                const isAnswered = answers[currentStation][index] !== null;
                const selectedAnswer = answers[currentStation][index];
                
                html += `
                    <div class="question-card">
                        <div class="question-number">Soalan ${index + 1}</div>
                        <div class="question-text-card">${q.q}</div>
                        <div class="question-options">
                `;
                
                q.opt.forEach((opt, optIdx) => {
                    let btnClass = 'option-btn-card';
                    if (isAnswered) {
                        if (optIdx === q.correct) {
                            btnClass += ' correct';
                        } else if (optIdx === selectedAnswer) {
                            btnClass += ' wrong';
                        }
                    }
                    
                    html += `<button class="${btnClass}" onclick="answerQuestion(${index}, ${optIdx})" ${isAnswered ? 'disabled' : ''}>
                        ${String.fromCharCode(65 + optIdx)}. ${opt}
                    </button>`;
                });
                
                if (isAnswered) {
                    const isCorrect = selectedAnswer === q.correct;
                    html += `
                        <div class="question-feedback" style="background: ${isCorrect ? '#d4edda' : '#f8d7da'};">
                            ${isCorrect ? '✅ Betul!' : '❌ Salah! Jawapan: ' + q.opt[q.correct]}
                        </div>
                    `;
                }
                
                html += `</div></div>`;
            });
            
            html += `</div>`;
            
            if (isComplete) {
                const gameCost = gameCosts[currentStation];
                
                html += `
                    <div class="game-container">
                        <div class="game-unlocked-banner">
                            🎉 TAHNIAH! Anda telah menjawab semua soalan! 🎉
                        </div>
                        
                        <div class="game-header-area">
                            <div class="game-title-large">🎮 ${getGameTitle(currentStation)}</div>
                            <div class="game-balance-large">💰 ${sejarahCoins} coins</div>
                        </div>
                        
                        <div class="game-area-large" id="gameArea">
                `;
                
                switch(currentStation) {
                    case 'palembang':
                        html += `<div id="snakeGameContainer"></div>`;
                        break;
                    case 'temasik':
                        html += renderCafeGame();
                        break;
                    case 'muar':
                        html += renderFlappyGame();
                        break;
                    case 'melaka':
                        html += renderInvadersGame();
                        break;
                }
                
                html += `
                        </div>
                        
                        <button class="play-game-large-btn" onclick="playGame()" ${sejarahCoins < gameCost ? 'disabled' : ''}>
                            🎮 Main Game (${gameCost} coins)
                        </button>
                        
                        <div class="game-instructions-panel">
                            <h4>📋 Cara Bermain:</h4>
                            ${getGameInstructions(currentStation)}
                        </div>
                    </div>
                `;
            } else {
                html += `
                    <div style="text-align: center; padding: 30px; background: #2c3e50; border-radius: 15px; margin-top: 20px; color: white;">
                        <span style="font-size: 3em; display: block; margin-bottom: 10px;">🔒</span>
                        <h3>Selesaikan semua 5 soalan untuk membuka game!</h3>
                    </div>
                `;
            }
            
            document.getElementById('gameContent').innerHTML = html;
            
            if (currentStation === 'palembang' && isComplete) {
                initSnakeCanvas();
            }
        }

        function getGameTitle(station) {
            const titles = {
                palembang: 'SNAKE.IO - Palembang Edition',
                temasik: 'CAFE - Temasik Bistro',
                muar: 'FLAPPY BIRD - Muar River',
                melaka: 'INVADERS - Defend Melaka'
            };
            return titles[station];
        }

        function getGameInstructions(station) {
            const instructions = {
                palembang: `
                    <li>Tekan "Main Game" untuk mulakan</li>
                    <li>Guna arrow keys (⬆️ ⬇️ ⬅️ ➡️) untuk gerak ular</li>
                    <li>Makan makanan merah 🟢 untuk dapat 25 coins</li>
                    <li>Jangan langgar dinding atau badan sendiri</li>
                    <li>Game Over akan kembali ke halaman utama</li>
                `,
                temasik: `
                    <li>Tekan "Main Game" untuk mulakan (60 saat)</li>
                    <li>Beli makanan (10 coins) dari dapur</li>
                    <li>Serve makanan yang sama dengan pelanggan</li>
                    <li>Dapat 30 coins setiap pelanggan puas</li>
                    <li>Kumpul skor tertinggi sebelum masa habis</li>
                `,
                muar: `
                    <li>Tekan "Main Game" untuk mulakan</li>
                    <li>Klik skrin untuk terbang ke atas</li>
                    <li>Elak paip hijau</li>
                    <li>Setiap paip berjaya dilalui dapat 25 coins</li>
                    <li>Game Over akan kembali ke halaman utama</li>
                `,
                melaka: `
                    <li>Tekan "Main Game" untuk mulakan</li>
                    <li>Guna butang ⬅️ ➡️ untuk gerak defender</li>
                    <li>Tekan 🔫 untuk tembak musuh</li>
                    <li>Setiap musuh dapat 50 coins</li>
                    <li>Kalahkan semua 15 musuh untuk menang!</li>
                `
            };
            return `<ul>${instructions[station]}</ul>`;
        }

        function loadGameContent() {
            const gameArea = document.getElementById('gameArea');
            if (!gameArea) return;

            switch(currentStation) {
                case 'palembang':
                    if (snakeCtx) drawSnakeCanvas();
                    break;
                case 'temasik':
                    gameArea.innerHTML = renderCafeGame();
                    break;
                case 'muar':
                    gameArea.innerHTML = renderFlappyGame();
                    break;
                case 'melaka':
                    gameArea.innerHTML = renderInvadersGame();
                    break;
            }
        }

        function answerQuestion(qIndex, optIndex) {
            if (!currentStation) return;
            
            const q = questions[currentStation][qIndex];
            
            if (answers[currentStation][qIndex] !== null) return;
            
            const isCorrect = optIndex === q.correct;
            
            answers[currentStation][qIndex] = optIndex;
            
            if (isCorrect) {
                scores[currentStation]++;
                addCoins(q.reward);
            }
            
            if (isStationComplete(currentStation)) {
                stationCompleted[currentStation] = true;
            }
            
            loadStationContent();
            updateAllDisplays();
        }

        function playGame() {
            if (!isStationComplete(currentStation)) {
                alert('Selesaikan semua soalan dahulu!');
                return;
            }
            
            const cost = gameCosts[currentStation];
            if (!spendCoins(cost)) {
                alert('Coins tidak mencukupi!');
                return;
            }
            
            switch(currentStation) {
                case 'palembang':
                    startSnakeGame();
                    break;
                case 'temasik':
                    startCafeGame();
                    break;
                case 'muar':
                    startFlappyGame();
                    break;
                case 'melaka':
                    startInvadersGame();
                    break;
            }
            
            loadGameContent();
        }

        function closeModal() {
            document.getElementById('gameModal').classList.add('hidden');
            currentStation = null;
            
            // Clear all intervals
            if (snakeGame.interval) clearInterval(snakeGame.interval);
            if (flappyGame.interval) clearInterval(flappyGame.interval);
            if (cafeGame.timerInterval) clearInterval(cafeGame.timerInterval);
            if (invadersGame.interval) clearInterval(invadersGame.interval);
        }

        function updateAllDisplays() {
            document.getElementById('coinAmount').textContent = sejarahCoins;
            
            stationOrder.forEach(station => {
                const dot = document.getElementById(`dot-${station}`);
                const scoreSpan = document.getElementById(`score-${station}`);
                
                if (stationCompleted[station]) {
                    dot.classList.add('completed');
                    scoreSpan.textContent = `${scores[station]}/5`;
                } else {
                    const index = stationOrder.indexOf(station);
                    if (index > 0 && !stationCompleted[stationOrder[index - 1]]) {
                        dot.classList.add('locked');
                        scoreSpan.textContent = '🔒';
                    } else {
                        scoreSpan.textContent = `${scores[station]}/5`;
                    }
                }
            });
            
            stationOrder.forEach((station, index) => {
                const btn = document.getElementById(`btn-${station}`);
                if (index === 0 || stationCompleted[stationOrder[index - 1]]) {
                    btn.disabled = false;
                    btn.classList.remove('locked');
                } else {
                    btn.disabled = true;
                    btn.classList.add('locked');
                }
                
                if (stationCompleted[station]) {
                    btn.classList.add('completed');
                }
            });
            
            const total = Object.values(scores).reduce((a, b) => a + b, 0);
            document.getElementById('totalScoreDisplay').innerHTML = `🌟 ${total}/20`;
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (!currentStation) return;
            
            if (currentStation === 'palembang' && snakeGame.gameActive) {
                if (e.key.startsWith('Arrow')) e.preventDefault();
                
                switch(e.key) {
                    case 'ArrowUp':
                        if (snakeGame.direction !== 'down') snakeGame.nextDirection = 'up';
                        break;
                    case 'ArrowDown':
                        if (snakeGame.direction !== 'up') snakeGame.nextDirection = 'down';
                        break;
                    case 'ArrowLeft':
                        if (snakeGame.direction !== 'right') snakeGame.nextDirection = 'left';
                        break;
                    case 'ArrowRight':
                        if (snakeGame.direction !== 'left') snakeGame.nextDirection = 'right';
                        break;
                }
            }
            
            if (currentStation === 'melaka' && invadersGame.gameActive) {
                if (e.key === 'ArrowLeft') moveDefender(-1);
                if (e.key === 'ArrowRight') moveDefender(1);
                if (e.key === ' ') {
                    e.preventDefault();
                    shootBullet();
                }
            }
        });

        // Event listeners
        document.getElementById('btn-palembang').addEventListener('click', () => openStation('palembang'));
        document.getElementById('btn-temasik').addEventListener('click', () => openStation('temasik'));
        document.getElementById('btn-muar').addEventListener('click', () => openStation('muar'));
        document.getElementById('btn-melaka').addEventListener('click', () => openStation('melaka'));

        document.getElementById('gameModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('gameModal')) closeModal();
        });

        // Initialize
        updateAllDisplays();
    </script>
</body>
</html>
